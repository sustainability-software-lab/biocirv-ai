[workspace]
name = "biocirv-ai"
channels = ["conda-forge"]
platforms = ["osx-arm64", "osx-64", "linux-64", "linux-aarch64", "win-64"]

[dependencies]
python = "3.11.*"
pip = "*"
nodejs = ">=18"

[pypi-dependencies]
ca-biositing-ai-exploration = { path = ".", editable = true }

[feature.gis.dependencies]
geopandas = "*"
folium = "*"
shapely = "*"
pyproj = "*"

[feature.dev.dependencies]
pytest = "*"
pre-commit = "*"
ipykernel = "*"
ipywidgets = "*"

[environments]
default = ["gis", "dev"]

[tasks]
kernel-install = "python -m ipykernel install --user --name biocirv-ai --display-name 'Python (BioCirv AI)'"
test = "pytest tests/"
check-env = "python -c 'import os; from dotenv import load_dotenv; load_dotenv(); print(\"CBORG Model:\", os.getenv(\"CBORG_MODEL\", \"Not Found\"))'"
